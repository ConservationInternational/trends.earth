name: Build plugin zipfile

on: [push, workflow_dispatch]

permissions:
  contents: read
  id-token: write

jobs:
  build_zipfile:
    name: Build zipfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history including tags for setuptools-scm
          fetch-tags: true
      - name: Install lrelease
        run: |
         sudo apt-get update
         sudo apt-get install -y qttools5-dev-tools
      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          cache: ''
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}
      - name: Set version SHA
        run: invoke set-version --modules
      - name: Build zipfile
        run: |
          # Sanitize branch name by replacing / with - to avoid path issues
          SAFE_REF_NAME=$(echo "$GITHUB_REF_NAME" | tr '/' '-')
          invoke zipfile-deploy --filename LDMP_${SAFE_REF_NAME}.zip -q 3.22

  update_dev_repository:
    name: Update development plugin repository
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build_zipfile
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          cache: ''

      - name: Stamp version in metadata.txt
        run: invoke set-version

      - name: Generate development plugins.xml
        run: |
          invoke generate-plugin-repo-xml \
            --prerelease \
            --prerelease-url "https://s3.amazonaws.com/trends.earth/sharing/LDMP_main.zip" \
            --prerelease-time "$(date +'%Y-%m-%dT%H:%M:%SZ')" \
            --prerelease-filename "LDMP_main.zip"

      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: release
          path: release
          fetch-depth: 0

      - name: Publish development plugins.xml to release branch
        run: |
          mkdir -p release/docs/repository/dev
          cp docs/repository/plugins.xml release/docs/repository/dev/plugins.xml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $GITHUB_WORKSPACE/release

          cd release
          git add docs/repository/dev/plugins.xml
          git commit -m "Update development plugin repository" || echo "Nothing to commit"
          git push origin release
