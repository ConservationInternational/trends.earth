name: Add comment on a pull request about the plugin package
# Based on work from https://github.com/orgs/community/discussions/51403#discussioncomment-5535167
on:
  workflow_run:
    types: [completed]
    workflows: ['Create plugin package in the PR']

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Detect fork PR
        env:
          HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
          THIS_REPO: ${{ github.repository }}
        run: |
          if [ "${HEAD_REPO}" != "${THIS_REPO}" ]; then
            echo "IS_FORK=true" >> $GITHUB_ENV
          else
            echo "IS_FORK=false" >> $GITHUB_ENV
          fi

      - name: Ensure jq and gh are available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          gh --version || true

      - name: Wait briefly for artifacts to finalize
        run: sleep 8

      - name: Download PR number artifact
        id: dl-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # Try gh first (extracts automatically)
          gh run download ${{ github.event.workflow_run.id }} --name pr_number --dir artifacts || true
          # Fallback to API if needed
          if [ ! -f artifacts/pr_number.txt ]; then
            curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
              | jq -r '.artifacts[] | select(.name=="pr_number" and .expired==false) | .archive_download_url' \
              > artifacts/pr_number_url.txt
            URL=$(cat artifacts/pr_number_url.txt)
            if [ -n "$URL" ]; then
              curl -L -H "Authorization: Bearer $GH_TOKEN" -o artifacts/pr_number.zip "$URL"
              unzip -o artifacts/pr_number.zip -d artifacts >/dev/null
            fi
          fi
          echo "PR_NUMBER=$(cat artifacts/pr_number.txt | tr -d '\n')" >> $GITHUB_ENV

      - name: Download artifact URL artifact
        id: dl-url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # Try gh first (extracts automatically)
          gh run download ${{ github.event.workflow_run.id }} --name artifact_url --dir artifacts || true
          # Fallback to API if needed
          if [ ! -f artifacts/artifact_url.txt ]; then
            curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
              | jq -r '.artifacts[] | select(.name=="artifact_url" and .expired==false) | .archive_download_url' \
              > artifacts/artifact_url_url.txt
            URL=$(cat artifacts/artifact_url_url.txt)
            if [ -n "$URL" ]; then
              curl -L -H "Authorization: Bearer $GH_TOKEN" -o artifacts/artifact_url.zip "$URL"
              unzip -o artifacts/artifact_url.zip -d artifacts >/dev/null
            fi
          fi
          echo "ARTIFACT_URL=$(cat artifacts/artifact_url.txt | tr -d '\n')" >> $GITHUB_ENV

      - name: Setup Python environment
        if: env.IS_FORK == 'false'
        uses: ./.github/actions/setup-python-env

      - name: Stamp version in metadata.txt
        if: env.IS_FORK == 'false'
        run: invoke set-version --modules

      - name: Download plugin ZIP artifact
        if: env.IS_FORK == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh run download ${{ github.event.workflow_run.id }} --name plugin_zip --dir artifacts || true
          if [ ! -f artifacts/LDMP.zip ]; then
            curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
              | jq -r '.artifacts[] | select(.name=="plugin_zip" and .expired==false) | .archive_download_url' \
              > artifacts/plugin_zip_url.txt
            URL=$(cat artifacts/plugin_zip_url.txt)
            if [ -n "$URL" ]; then
              curl -L -H "Authorization: Bearer $GH_TOKEN" -o artifacts/plugin_zip.zip "$URL"
              unzip -o artifacts/plugin_zip.zip -d artifacts >/dev/null
            fi
          fi

      - name: Checkout release branch
        if: env.IS_FORK == 'false'
        uses: actions/checkout@v6
        with:
          ref: release
          path: release
          clean: false
          fetch-depth: 0

      - name: Update plugin repository on release branch
        if: env.IS_FORK == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          SAFE_BRANCH=$(echo "${HEAD_BRANCH}" | tr '/' '_')
          mkdir -p release/docs/repository/branches/${SAFE_BRANCH}

          cp artifacts/LDMP.zip release/docs/repository/branches/${SAFE_BRANCH}/LDMP.zip

          DOWNLOAD_URL="https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/release/docs/repository/branches/${SAFE_BRANCH}/LDMP.zip"

          invoke generate-plugin-repo-xml \
            --prerelease \
            --prerelease-url "$DOWNLOAD_URL" \
            --prerelease-time "$(date +'%Y-%m-%dT%H:%M:%SZ')" \
            --prerelease-filename "LDMP.zip"

          cp docs/repository/plugins.xml release/docs/repository/branches/${SAFE_BRANCH}/plugins.xml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $GITHUB_WORKSPACE/release

          cd release
          git add docs/repository/branches/${SAFE_BRANCH}
          git commit -m "Add PR branch ${SAFE_BRANCH} plugin repository"
          git push origin release

          echo "REPO_URL=https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/release/docs/repository/branches/${SAFE_BRANCH}/plugins.xml" >> $GITHUB_ENV

      - name: Compose comment body
        id: body
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          REPO_LINE=""
          if [ -n "${REPO_URL}" ]; then
            REPO_LINE="🗂️ **QGIS Repository Link:** ${REPO_URL}"
          fi
          cat > body.md <<EOF
          <!-- LDMP_PLUGIN_BUILD_COMMENT -->
          ## 🚀 **Plugin Build Successful!** ✅

          A new **plugin build** has been successfully generated for the changes in this pull request! 🎉

          🔗 **Download Plugin Zip:** ${ARTIFACT_URL}
          ${REPO_LINE}

          _Built from branch **${HEAD_BRANCH}**, commit **${HEAD_SHA}**_
          
          ### 📌 **Next Steps**  
          - 📥 **Download and test** the plugin built from this pull request.  
          - 🔄 **Review the changes** and validate functionality.  
          - 📝 **Provide feedback on this pull request!**  
          ---
          ### **🛠 Powered by GitHub Actions & gh API**  
          
          EOF

      - name: Find existing bot comment (by marker)
        id: find_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --jq '.[] | select(.user.login=="github-actions[bot]" and (.body|contains("<!-- LDMP_PLUGIN_BUILD_COMMENT -->"))) | .id' || true)
          echo "COMMENT_ID=$CID" >> $GITHUB_ENV
          echo "comment_id=$CID" >> $GITHUB_OUTPUT

      - name: Update or create comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH \
              -F body=@body.md
          else
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
              -F body=@body.md
          fi
