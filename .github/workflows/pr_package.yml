name: Create plugin package in the PR

on:
  pull_request:
    types: [edited, opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  create-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history including tags for setuptools-scm
          fetch-tags: true

      - name: Build plugin ZIP
        uses: ./.github/actions/build-plugin-zip
        with:
          # Filename is finalised after we know the PACKAGE_ID; build-plugin-zip
          # stamps the version and compiles translations.  We pass a temporary
          # name here and rename below once we have the unique suffix.
          filename: LDMP-pr.zip

      - name: Install additional plugin dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Verify te_algorithms import
        run: |
          python - <<'PY'
          import sys
          try:
              import te_algorithms
              print('te_algorithms imported, version:', getattr(te_algorithms, '__version__', 'unknown'))
          except Exception as e:
              print('Failed to import te_algorithms:', e)
              sys.exit(1)
          PY

      - name: Get unique identifier and rename ZIP
        id: get-identifier
        shell: bash
        run: |
          PACKAGE_ID=$(python -c "import uuid; print(uuid.uuid4().hex[:4])")
          echo "PACKAGE_ID=${PACKAGE_ID}" >> $GITHUB_ENV
          SAFE_REF_NAME="${{ github.event.pull_request.head.ref }}"
          SAFE_REF_NAME="${SAFE_REF_NAME//\//_}"
          mv LDMP-pr.zip "LDMP-${SAFE_REF_NAME}_${PACKAGE_ID}.zip"
          echo "REF_NAME=${SAFE_REF_NAME}" >> $GITHUB_ENV

      - name: Plugin path details
        id: get-zip-details
        shell: bash
        run: |
          ls
          unzip -o "$GITHUB_WORKSPACE/LDMP-${REF_NAME}_${PACKAGE_ID}.zip" -d build
          ZIPDIR="build/LDMP-${REF_NAME}_${PACKAGE_ID}"
          mkdir -p "${ZIPDIR}"
          mv build/LDMP "${ZIPDIR}/LDMP"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/${ZIPDIR}" >> $GITHUB_ENV
          echo "ZIP_NAME=LDMP-${REF_NAME}_${PACKAGE_ID}" >> $GITHUB_ENV

      - name: Copy plugin ZIP for repository generation
        shell: bash
        run: cp "LDMP-${REF_NAME}_${PACKAGE_ID}.zip" LDMP.zip

      - name: Upload plugin ZIP for repository generation
        uses: actions/upload-artifact@v7
        with:
          name: plugin_zip
          path: LDMP.zip

      - name: Uploading plugin build
        id: artifact-upload-step
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}

      - name: Save the artifact url and pull request number
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.number }}
          ARTIFACT_URL: ${{ steps.artifact-upload-step.outputs.artifact-url }}
        run: |
          echo "$ARTIFACT_URL" > artifact_url.txt
          echo "$PR_NUMBER" > pr_number.txt

      - name: Upload the artifact url
        uses: actions/upload-artifact@v7
        with:
          name: artifact_url
          path: ./artifact_url.txt

      - name: Upload the PR number
        uses: actions/upload-artifact@v7
        with:
          name: pr_number
          path: ./pr_number.txt
