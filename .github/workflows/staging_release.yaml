name: Updating staging with a new released plugin
on:
  release:
    types:
      - published
      - edited

permissions:
  contents: write

jobs:
  update-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history including tags for setuptools-scm

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: release
          path: release
          fetch-depth: 0  # Fetch all history including tags for setuptools-scm
      - name: Update custom plugin repository to include latest plugin releases
        working-directory: ${{ github.workspace }}/release
        run: |
          invoke generate-plugin-repo-xml
          echo " " >> docs/repository/plugins.xml 
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $GITHUB_WORKSPACE/release

          git add -A
          git commit -m "Update on plugins.xml"
          git push origin release
